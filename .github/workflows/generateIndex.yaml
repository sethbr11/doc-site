name: Generate Index

on:
  push:
    branches:
      - main # Adjust if using a different branch

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true # Use GITHUB_TOKEN for authentication

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18 # Use latest LTS version

      - name: Generate index.json
        run: node generateIndex.js # Make sure the file exists

      - name: Commit and push if changes exist
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update index.json" && git push)
