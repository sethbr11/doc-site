name: Generate Index

on:
  push:
    branches:
      - main # Change to your branch if needed

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false # Prevents conflicts when pushing changes

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18 # Use the latest LTS version

      - name: Generate index.json
        run: node generateIndex.js # Replace with the actual script filename

      - name: Commit and push if changes exist
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update index.json" && git push)
